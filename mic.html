<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VERSANT External Mic</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d0e12;
      --panel: #15171e;
      --panel2: #1f2330;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #deff9a;
      --danger: #f87171;
      --line: #2a2f3d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    main {
      width: min(560px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
    }
    h1 { margin: 0 0 8px; font-size: 24px; }
    p { color: var(--muted); line-height: 1.65; }
    .status {
      margin: 18px 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #101219;
    }
    .meter {
      height: 12px;
      background: #07080c;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid var(--line);
      margin-top: 10px;
    }
    .bar {
      width: 0%;
      height: 100%;
      background: var(--accent);
      transition: width 80ms linear;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      font-weight: 800;
      background: var(--accent);
      color: #050505;
      cursor: pointer;
    }
    button.secondary {
      background: var(--panel2);
      color: var(--text);
      border: 1px solid var(--line);
    }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .error { color: var(--danger); }
    pre {
      max-height: 170px;
      overflow: auto;
      white-space: pre-wrap;
      color: var(--muted);
      background: #08090d;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main>
    <h1>VERSANT External Mic</h1>
    <p>
      このページはGAS iframeでブロックされるマイク取得だけを代替します。
      このウィンドウを開いたまま、GAS側で練習を進めてください。
    </p>

    <div class="status">
      <div id="status">待機中</div>
      <div class="meter"><div id="level" class="bar"></div></div>
    </div>

    <div class="row">
      <button onclick="runStandaloneTest()">単体マイクテスト</button>
      <button class="secondary" onclick="notifyReady()">GASへ再接続</button>
    </div>

    <pre id="log">ready</pre>
  </main>

  <script>
    const SOURCE = 'versant-external-mic';
    const MAIN_SOURCE = 'versant-main-app';
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    let activeStream = null;
    let activeAudioCtx = null;
    let activeTimer = null;
    let activeRecognition = null;
    let recording = false;

    function log(message, detail) {
      const line = `[${new Date().toLocaleTimeString()}] ${message}` +
        (detail ? `\n${JSON.stringify(detail, null, 2)}` : '');
      document.getElementById('log').textContent = `${line}\n\n${document.getElementById('log').textContent}`.slice(0, 5000);
    }

    function setStatus(text, isError) {
      const el = document.getElementById('status');
      el.textContent = text;
      el.className = isError ? 'error' : '';
    }

    function notifyReady() {
      if (window.opener) {
        window.opener.postMessage({ source: SOURCE, type: 'ready' }, '*');
      }
      log('ready sent to opener');
    }

    function stopMedia() {
      if (activeTimer) {
        clearInterval(activeTimer);
        activeTimer = null;
      }
      if (activeRecognition) {
        try { activeRecognition.stop(); } catch (e) {}
        activeRecognition = null;
      }
      if (activeStream) {
        activeStream.getTracks().forEach(track => track.stop());
        activeStream = null;
      }
      if (activeAudioCtx) {
        try { activeAudioCtx.close(); } catch (e) {}
        activeAudioCtx = null;
      }
      document.getElementById('level').style.width = '0%';
      recording = false;
    }

    async function startMetrics(stream) {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return null;

      const audioCtx = new AudioContext();
      activeAudioCtx = audioCtx;
      const source = audioCtx.createMediaStreamSource(stream);
      const analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048;
      source.connect(analyser);

      const data = new Uint8Array(analyser.fftSize);
      const state = {
        startedAt: Date.now(),
        firstSpeechAt: null,
        lastSpeechAt: null,
        activeFrames: 0,
        silentFrames: 0,
        maxSilenceFrames: 0,
        currentSilenceFrames: 0,
        sampleCount: 0,
        audioLevelSum: 0,
        totalSamples: 0,
        clippingSamples: 0,
        threshold: 0.025
      };

      activeTimer = setInterval(() => {
        analyser.getByteTimeDomainData(data);
        let sum = 0;
        let clipping = 0;
        for (let i = 0; i < data.length; i++) {
          const normalized = (data[i] - 128) / 128;
          const abs = Math.abs(normalized);
          sum += normalized * normalized;
          if (abs >= 0.98) clipping += 1;
        }

        const rms = Math.sqrt(sum / data.length);
        const speaking = rms >= state.threshold;
        state.sampleCount += 1;
        state.audioLevelSum += rms;
        state.totalSamples += data.length;
        state.clippingSamples += clipping;

        if (speaking) {
          state.activeFrames += 1;
          state.currentSilenceFrames = 0;
          if (state.firstSpeechAt === null) state.firstSpeechAt = Date.now();
          state.lastSpeechAt = Date.now();
        } else {
          state.silentFrames += 1;
          state.currentSilenceFrames += 1;
          state.maxSilenceFrames = Math.max(state.maxSilenceFrames, state.currentSilenceFrames);
        }

        document.getElementById('level').style.width = `${Math.min(100, Math.round(rms * 800))}%`;
      }, 50);

      return () => ({
        durationMs: Date.now() - state.startedAt,
        initialLatencyMs: state.firstSpeechAt === null ? null : state.firstSpeechAt - state.startedAt,
        totalPauseMs: Math.round(state.silentFrames * 50),
        maxPauseMs: Math.round(state.maxSilenceFrames * 50),
        activeSpeechMs: Math.round(state.activeFrames * 50),
        audioLevel: state.sampleCount ? Number((state.audioLevelSum / state.sampleCount).toFixed(4)) : null,
        clippingRate: state.totalSamples ? Number((state.clippingSamples / state.totalSamples).toFixed(4)) : null,
        speechDetected: state.firstSpeechAt !== null,
        vadThreshold: Number(state.threshold.toFixed(4))
      });
    }

    async function recordForSeconds(request) {
      if (recording) stopMedia();
      recording = true;

      const seconds = Math.max(1, Number(request.seconds || 5));
      const requestId = request.requestId;
      let transcript = '';
      let confidence = null;
      let getMetrics = null;
      let resolved = false;

      function finish(ok, error) {
        if (resolved) return;
        resolved = true;
        const metrics = getMetrics ? getMetrics() : null;
        stopMedia();
        setStatus(ok ? '録音完了。GASへ送信しました。' : '録音に失敗しました。', !ok);
        if (window.opener) {
          window.opener.postMessage({
            source: SOURCE,
            type: 'recordResult',
            requestId,
            ok,
            transcript,
            confidence,
            metrics,
            error
          }, '*');
        }
      }

      try {
        setStatus(`${seconds}秒録音中...`, false);
        activeStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        getMetrics = await startMetrics(activeStream);

        if (SpeechRecognition) {
          activeRecognition = new SpeechRecognition();
          activeRecognition.lang = request.lang || 'en-US';
          activeRecognition.continuous = true;
          activeRecognition.interimResults = true;
          activeRecognition.onresult = event => {
            for (let i = event.resultIndex; i < event.results.length; i++) {
              const result = event.results[i];
              if (result.isFinal) {
                transcript += result[0].transcript + ' ';
                if (typeof result[0].confidence === 'number') confidence = result[0].confidence;
              }
            }
          };
          activeRecognition.onerror = event => {
            log('speech recognition error', { error: event.error, message: event.message || '' });
          };
          activeRecognition.start();
        } else {
          log('SpeechRecognition is not available; returning audio metrics only');
        }

        setTimeout(() => finish(true, null), seconds * 1000);
      } catch (e) {
        log('record failed', { name: e.name, message: e.message });
        finish(false, { name: e.name || 'Error', message: e.message || String(e) });
      }
    }

    async function runStandaloneTest() {
      const requestId = `standalone-${Date.now()}`;
      await recordForSeconds({ requestId, seconds: 5, lang: 'en-US' });
      log('standalone test finished');
    }

    window.addEventListener('message', event => {
      const data = event.data || {};
      if (!data || data.source !== MAIN_SOURCE) return;
      if (data.type === 'record') {
        recordForSeconds(data);
      }
      if (data.type === 'ping') {
        notifyReady();
      }
    });

    window.addEventListener('beforeunload', stopMedia);
    notifyReady();
  </script>
</body>
</html>
